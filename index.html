        line-height: 1em;

        border-bottom: 1px solid #4688;
      }
      #main{
        display: flex;
        flex-wrap: wrap;
        justify-content: space-evenly;
      }
      .thumb{
        width: 400px;
        height: 300px;
        background-repeat: no-repeat;
        background-size: cover;
        background-position: center center;
        background-color: transparent;
        border-radius: 10px;
        border: 1px solid #4688;
        margin: 10px;
        cursor: pointer;
        align-self: flex-start;
      }
    </style>

      var main = document.querySelector('#main')
      main.innerHTML = ''
      
      fileList.forEach((item, idx) => {
        var el = document.createElement('div')
        el.className = 'thumb'
        el.title = item
        var tidx = ((idx+1)+'').padStart(3, '0')
        el.style.backgroundImage = `url(./thumbs/thumb${tidx}.png)`
        el.onclick = () => {
          var a = document.createElement('a')
          a.target = '_blank'
          a.href = item
          a.style.position = 'absolute'
          a.style.opacity = 0
          document.body.appendChild(a)
          a.click()
          a.remove()
        }
        main.appendChild(el)
      })
